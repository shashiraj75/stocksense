name: Keep Server Alive (Market Hours)

on:
  schedule:
    # Every 10 min, 24/7 — covers India market (8AM-6PM IST) + US market (8PM-2:30AM IST)
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          curl -sS --max-time 30 \
            https://stocksense-api-12ii.onrender.com/health \
            && echo "Server is alive" \
            || echo "Ping failed (server may be starting up)"
