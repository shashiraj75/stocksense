name: Keep Server Alive

on:
  schedule:
    # Every 10 min, 24/7 — Railway doesn't sleep but this acts as a health monitor
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Railway backend health endpoint
        run: |
          curl -sS --max-time 30 \
            https://stocksense-production-7e0d.up.railway.app/health \
            && echo "Server is alive" \
            || echo "Ping failed"
