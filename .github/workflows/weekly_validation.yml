name: Weekly Model Validation (Sunday)

on:
  schedule:
    # 02:00 UTC Sunday = 7:30 AM IST Sunday (market closed, server idle)
    - cron: "0 2 * * 0"
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  run-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render
        run: |
          echo "Pinging backend to wake Render from sleep..."
          curl -sf --max-time 60 --retry 3 --retry-delay 15 \
            https://stocksense-api-12ii.onrender.com/health
          echo " — backend alive"
          # Give it a few extra seconds to fully initialise
          sleep 10

      - name: Run medium-horizon validation (all Nifty 100)
        run: |
          echo "Starting medium-horizon validation..."
          curl -sS --fail-with-body -X POST \
            "https://stocksense-api-12ii.onrender.com/api/validation/run?horizon=medium"
          echo ""

      - name: Wait for medium run to finish (~15 min)
        run: |
          for i in $(seq 1 30); do
            sleep 30
            STATUS=$(curl -s "https://stocksense-api-12ii.onrender.com/api/validation/status")
            RUNNING=$(echo $STATUS | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('running', True))")
            PROGRESS=$(echo $STATUS | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('progress',0))")
            TOTAL=$(echo $STATUS | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('total',0))")
            echo "[$i] running=$RUNNING  $PROGRESS/$TOTAL"
            if [ "$RUNNING" = "False" ] && [ "$TOTAL" != "0" ]; then
              echo "Medium run complete."
              break
            fi
          done

      - name: Run long-horizon validation (all Nifty 100)
        run: |
          echo "Starting long-horizon validation..."
          curl -sS --fail-with-body -X POST \
            "https://stocksense-api-12ii.onrender.com/api/validation/run?horizon=long"
          echo ""

      - name: Wait for long run to finish (~25 min)
        run: |
          for i in $(seq 1 55); do
            sleep 30
            STATUS=$(curl -s "https://stocksense-api-12ii.onrender.com/api/validation/status")
            RUNNING=$(echo $STATUS | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('running', True))")
            PROGRESS=$(echo $STATUS | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('progress',0))")
            TOTAL=$(echo $STATUS | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('total',0))")
            echo "[$i] running=$RUNNING  $PROGRESS/$TOTAL"
            if [ "$RUNNING" = "False" ] && [ "$TOTAL" != "0" ]; then
              echo "Long run complete."
              break
            fi
          done

      - name: Print summary
        run: |
          echo ""
          echo "=== Medium-horizon results ==="
          curl -s "https://stocksense-api-12ii.onrender.com/api/validation/results?horizon=medium" | \
            python3 -c "
import sys, json
d = json.load(sys.stdin)
if d.get('available'):
    print(f'  BUY hit rate:    {d.get(\"buy_hit_rate_pct\")}%')
    print(f'  Beat benchmark:  {d.get(\"beat_benchmark_pct\")}%')
    print(f'  Avg alpha:       {d.get(\"avg_alpha_on_buy_pct\")}%')
    print(f'  Sharpe (buys):   {d.get(\"sharpe_on_buys\")}')
    print(f'  Total signals:   {d.get(\"total_signals\")}')
else:
    print('  No results available:', d.get('message'))
"
          echo ""
          echo "=== Long-horizon results ==="
          curl -s "https://stocksense-api-12ii.onrender.com/api/validation/results?horizon=long" | \
            python3 -c "
import sys, json
d = json.load(sys.stdin)
if d.get('available'):
    print(f'  BUY hit rate:    {d.get(\"buy_hit_rate_pct\")}%')
    print(f'  Beat benchmark:  {d.get(\"beat_benchmark_pct\")}%')
    print(f'  Avg alpha:       {d.get(\"avg_alpha_on_buy_pct\")}%')
    print(f'  Sharpe (buys):   {d.get(\"sharpe_on_buys\")}')
    print(f'  Total signals:   {d.get(\"total_signals\")}')
else:
    print('  No results available:', d.get('message'))
"
