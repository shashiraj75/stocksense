name: Daily Stock Picks (9 AM IST)

on:
  schedule:
    # 3:00 UTC = 8:30 AM IST — generation takes ~10 min, results ready by 9 AM IST
    - cron: "0 3 * * 1-5"   # Monday–Friday only (market days)
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  generate-picks:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render (wait until healthy)
        run: |
          echo "Waiting for Render server to be ready..."
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
              https://stocksense-api-12ii.onrender.com/health)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Server is ready!"
              break
            fi
            sleep 30
          done

      - name: Trigger pick generation
        run: |
          echo "Triggering daily picks generation at $(date -u)..."
          curl -sS --fail-with-body --max-time 30 \
            -X POST \
            -H "x-secret: ${{ secrets.PICKS_SECRET }}" \
            https://stocksense-api-12ii.onrender.com/api/picks/generate
          echo ""
          echo "Generation started. Picks will be ready in ~10 minutes."
