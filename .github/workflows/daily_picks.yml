name: Daily Stock Picks (2 AM IST)

on:
  schedule:
    # 20:30 UTC = 2:00 AM IST — 750 stocks × 3 horizons takes ~3.75 hrs, done by ~5:45 AM IST
    - cron: "30 20 * * 0-4"   # Sun–Thu UTC = Mon–Fri IST (market days)
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  generate-picks:
    runs-on: ubuntu-latest
    steps:
      - name: Check Railway backend is healthy
        run: |
          echo "Checking Railway backend at $(date -u) UTC..."
          for i in $(seq 1 5); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
              https://stocksense-production-7e0d.up.railway.app/health)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Server is ready!"
              break
            fi
            sleep 10
          done

      - name: Trigger pick generation
        run: |
          echo "Triggering daily picks generation at $(date -u) UTC (2:00 AM IST)..."
          curl -sS --fail-with-body --max-time 30 \
            -X POST \
            -H "x-secret: ${{ secrets.PICKS_SECRET }}" \
            https://stocksense-production-7e0d.up.railway.app/api/picks/generate
          echo ""
          echo "Generation started. 750 stocks x 3 horizons — picks ready by ~5:45 AM IST."
