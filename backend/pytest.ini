[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: fast, no I/O, pure-logic tests of a single function
    integration: exercises multiple modules together (still no live network calls)
    regression: locks in behavior for a previously-found bug so it can't silently return
    golden: snapshot-style test asserting a full engine output against a known-good fixture
